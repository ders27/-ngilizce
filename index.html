<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Kelime Macerası</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #FFF8E1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 0;
}
#app {
    background: #ffffff;
    border-radius: 15px;
    width: 95%;
    max-width: 700px;
    padding: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
h1 { text-align: center; color: #FF5722; }
h2 { margin-top: 20px; color: #FF9800; }
.word-blocks { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.word-card {
    width: 120px; height: 120px; background: #FFFDE7; border: 2px solid #FFAB00; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
    transition: transform 0.2s;
    font-weight: bold; font-size: 1em;
}
.word-card:hover { transform: scale(1.05); }
.word-card img { width: 40px; height: 40px; margin-bottom: 5px; }
#turkish-meaning { margin-top: 15px; font-size: 1.2em; color: #4CAF50; min-height: 1.5em; text-align:center; }
.menu-buttons { display: flex; flex-wrap: wrap; gap:10px; justify-content: center; margin-top: 20px; }
.menu-buttons button { padding: 10px 15px; border-radius: 8px; background:#FF5722; color:white; border:none; cursor:pointer; font-weight:bold; }
.menu-buttons button:hover { background:#E64A19; }
#test-section { display:none; }
.test-question { font-size:1.5em; margin:15px 0; text-align:center; }
.test-options { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.test-options button { padding:10px 15px; border-radius:8px; border:1px solid #ccc; cursor:pointer; font-weight:bold; background:#f3f3f3; }
.test-options button:hover { background:#ddd; }
.feedback { margin-top:10px; font-weight:bold; text-align:center; min-height:1.2em; }
#navigation { display:flex; justify-content:space-between; margin-top:20px; }
#navigation button { padding:8px 15px; border:none; border-radius:6px; background:#2196F3; color:white; cursor:pointer; }
#navigation button:hover { background:#1976D2; }
</style>
</head>
<body>
<div id="app">
<h1>İngilizce Kelime Macerası</h1>

<div id="menu-section">
    <h2>Konular</h2>
    <div class="menu-buttons" id="topic-buttons"></div>
</div>

<div id="learn-section" style="display:none;">
    <h2 id="topic-title"></h2>
    <div class="word-blocks" id="word-blocks"></div>
    <div id="turkish-meaning"></div>
    <div id="navigation">
        <button onclick="showMenu()">🏠 Menü</button>
    </div>
</div>

<div id="test-section">
    <h2>Kelime Testi</h2>
    <div class="test-question" id="test-question"></div>
    <div class="test-options" id="test-options"></div>
    <div class="feedback" id="feedback"></div>
    <div id="navigation">
        <button onclick="prevTest()">⬅ Önceki</button>
        <button onclick="nextTest()">Sonraki ➡</button>
    </div>
</div>

<audio id="correct-sound" src="sounds/correct.mp3"></audio>
<audio id="wrong-sound" src="sounds/wrong.mp3"></audio>
</div>

// Menü oluştur
const topicButtons = document.getElementById('topic-buttons');
topics.forEach((topic,index)=>{
    const btn=document.createElement('button');
    btn.textContent=topic.title;
    btn.onclick=()=>showTopic(index);
    topicButtons.appendChild(btn);
});

const learnSection = document.getElementById('learn-section');
const menuSection = document.getElementById('menu-section');
const wordBlocks = document.getElementById('word-blocks');
const turkishMeaning = document.getElementById('turkish-meaning');
const topicTitle = document.getElementById('topic-title');

function showTopic(index){
    menuSection.style.display='none';
    learnSection.style.display='block';
    wordBlocks.innerHTML='';
    topicTitle.textContent = topics[index].title;
    topics[index].words.forEach(w=>{
        const card=document.createElement('div');
        card.className='word-card';
        card.innerHTML=`<div>${w.icon}</div><div>${w.en}</div>`;
        card.onclick=()=>turkishMeaning.textContent=w.tr;
        wordBlocks.appendChild(card);
    });
}

function showMenu(){
    learnSection.style.display='none';
    menuSection.style.display='block';
}
</script>

</html>
