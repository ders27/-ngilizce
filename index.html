<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Kelime Öğrenme & Test</title>
<style>
body {font-family: Arial, sans-serif; background: #f0f8ff; margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh;}
#app {width:95%; max-width:700px; background:#fff; border-radius:20px; padding:20px; box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.screen {display:none;}
.screen.active {display:block;}
h1,h2{color:#333; text-align:center;}
button {padding:10px 20px; margin:5px; border:none; border-radius:10px; cursor:pointer;}
#menu-buttons button {width:45%; font-weight:bold;}
.word-card {margin:20px auto; padding:30px; border:2px solid #2196f3; border-radius:15px; text-align:center; font-size:2em; cursor:pointer; transition:0.3s;}
.word-card.show-meaning {color:#f44336;}
.test-options {display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;}
.test-options button {padding:15px; border-radius:10px; border:1px solid #ccc; cursor:pointer;}
.feedback {margin-top:20px; font-weight:bold; text-align:center; font-size:1.2em;}
.nav-buttons {display:flex; justify-content:space-between; margin-top:20px;}
</style>
</head>
<body>
<div id="app"><div id="screen-menu" class="screen active">
<h1>İngilizce Kelime Uygulaması</h1>
<div id="menu-buttons">
<button onclick="openWords()">📖 Kelimeler</button>
<button onclick="openTest()">📝 Test</button>
</div>
</div><div id="screen-words" class="screen">
<h2 id="unit-title">Kelimeler</h2>
<div id="word-container" class="word-card">Kelime</div>
<div class="nav-buttons">
<button onclick="prevWord()">⬅️</button>
<button onclick="nextWord()">➡️</button>
<button onclick="backToMenu()">🏠 Menü</button>
</div>
</div><div id="screen-test" class="screen">
<h2>Kelime Testi</h2>
<div id="test-word" style="text-align:center; font-size:2em;">Kelime</div>
<div class="test-options" id="test-options"></div>
<div class="feedback" id="test-feedback"></div>
<button onclick="backToMenu()">🏠 Menü</button>
</div><audio id="sound-correct" src="https://freesound.org/data/previews/331/331912_3248244-lq.mp3"></audio> <audio id="sound-wrong" src="https://freesound.org/data/previews/256/256113_4486188-lq.mp3"></audio>

</div>
<script>
let currentUnit = 0;
let currentWordIndex = 0;const units = [ {title:'Selamlaşma', words:[ {eng:'Hello',tr:'Merhaba'}, {eng:'Goodbye',tr:'Güle güle'}, {eng:'Good morning',tr:'Günaydın'}, {eng:'Good night',tr:'İyi geceler'}, {eng:'See you',tr:'Görüşürüz'}, {eng:'How are you?',tr:'Nasılsın?'}, {eng:'I am fine',tr:'İyiyim'}, {eng:'Thank you',tr:'Teşekkür ederim'}, {eng:'Please',tr:'Lütfen'}, {eng:'Yes',tr:'Evet'}]}, {title:'Sayılar', words:[ {eng:'One',tr:'Bir'},{eng:'Two',tr:'İki'},{eng:'Three',tr:'Üç'},{eng:'Four',tr:'Dört'},{eng:'Five',tr:'Beş'},{eng:'Six',tr:'Altı'},{eng:'Seven',tr:'Yedi'},{eng:'Eight',tr:'Sekiz'},{eng:'Nine',tr:'Dokuz'},{eng:'Ten',tr:'On'}]}, {title:'Ev', words:[ {eng:'House',tr:'Ev'},{eng:'Door',tr:'Kapı'},{eng:'Window',tr:'Pencere'},{eng:'Chair',tr:'Sandalye'},{eng:'Table',tr:'Masa'},{eng:'Bed',tr:'Yatak'},{eng:'Kitchen',tr:'Mutfak'},{eng:'Bathroom',tr:'Banyo'},{eng:'Living room',tr:'Oturma odası'},{eng:'Garden',tr:'Bahçe'}]}, {title:'Mutfak', words:[ {eng:'Water',tr:'Su'},{eng:'Bread',tr:'Ekmek'},{eng:'Milk',tr:'Süt'},{eng:'Egg',tr:'Yumurta'},{eng:'Cheese',tr:'Peynir'},{eng:'Apple',tr:'Elma'},{eng:'Banana',tr:'Muz'},{eng:'Plate',tr:'Tabak'},{eng:'Spoon',tr:'Kaşık'},{eng:'Fork',tr:'Çatal'}]}, {title:'Okul', words:[ {eng:'Book',tr:'Kitap'},{eng:'Pen',tr:'Kalem'},{eng:'Notebook',tr:'Defter'},{eng:'Teacher',tr:'Öğretmen'},{eng:'Student',tr:'Öğrenci'},{eng:'Classroom',tr:'Sınıf'},{eng:'Bag',tr:'Çanta'},{eng:'Desk',tr:'Sıra'},{eng:'Chair',tr:'Sandalye'},{eng:'Lesson',tr:'Ders'}]}, {title:'Fiiller', words:[ {eng:'Go',tr:'Gitmek'},{eng:'Come',tr:'Gelmek'},{eng:'Run',tr:'Koşmak'},{eng:'Walk',tr:'Yürümek'},{eng:'Eat',tr:'Yemek yemek'},{eng:'Drink',tr:'İçmek'},{eng:'Read',tr:'Okumak'},{eng:'Write',tr:'Yazmak'},{eng:'Sleep',tr:'Uyumak'},{eng:'Play',tr:'Oynamak'}]}, {title:'Aile', words:[ {eng:'Mother',tr:'Anne'},{eng:'Father',tr:'Baba'},{eng:'Brother',tr:'Kardeş'},{eng:'Sister',tr:'Kız kardeş'},{eng:'Grandmother',tr:'Büyükanne'},{eng:'Grandfather',tr:'Büyükbaba'},{eng:'Uncle',tr:'Amca'},{eng:'Aunt',tr:'Teyze'},{eng:'Cousin',tr:'Kuzen'},{eng:'Baby',tr:'Bebek'}]}, {title:'Hayvanlar', words:[ {eng:'Cat',tr:'Kedi'},{eng:'Dog',tr:'Köpek'},{eng:'Bird',tr:'Kuş'},{eng:'Fish',tr:'Balık'},{eng:'Horse',tr:'At'},{eng:'Cow',tr:'İnek'},{eng:'Sheep',tr:'Koyun'},{eng:'Goat',tr:'Keçi'},{eng:'Rabbit',tr:'Tavşan'},{eng:'Mouse',tr:'Fare'}]}, {title:'Günlük kelimeler', words:[ {eng:'Sun',tr:'Güneş'},{eng:'Rain',tr:'Yağmur'},{eng:'Wind',tr:'Rüzgar'},{eng:'Snow',tr:'Kar'},{eng:'Hot',tr:'Sıcak'},{eng:'Cold',tr:'Soğuk'},{eng:'Monday',tr:'Pazartesi'},{eng:'Tuesday',tr:'Salı'},{eng:'Wednesday',tr:'Çarşamba'},{eng:'Thursday',tr:'Perşembe'}} ];

function openWords(){currentUnit=0; currentWordIndex=0; document.getElementById('screen-menu').classList.remove('active'); document.getElementById('screen-words').classList.add('active'); showWord();} function openTest(){prepareTest(); document.getElementById('screen-menu').classList.remove('active'); document.getElementById('screen-test').classList.add('active');} function backToMenu(){document.getElementById('screen-words').classList.remove('active'); document.getElementById('screen-test').classList.remove('active'); document.getElementById('screen-menu').classList.add('active');} function showWord(){ const word = units[currentUnit].words[currentWordIndex]; const el = document.getElementById('word-container'); el.textContent = word.eng; el.classList.remove('show-meaning'); document.getElementById('unit-title').textContent = units[currentUnit].title; } document.getElementById('word-container').addEventListener('click',()=>{ const word = units[currentUnit].words[currentWordIndex]; const el=document.getElementById('word-container'); el.textContent=word.eng + ' - ' + word.tr; el.classList.add('show-meaning'); new Audio('https://freesound.org/data/previews/331/331912_3248244-lq.mp3').play(); }); function nextWord(){currentWordIndex++; if(currentWordIndex>=units[currentUnit].words.length){currentWordIndex=0; currentUnit++; if(currentUnit>=units.length){currentUnit=0;}} showWord();} function prevWord(){currentWordIndex--; if(currentWordIndex<0){currentUnit--; if(currentUnit<0){currentUnit=units.length-1;} currentWordIndex=units[currentUnit].words.length-1;} showWord();}

// Test let testQuestions=[]; let currentTestIndex=0; function prepareTest(){testQuestions=[]; units.forEach(unit=>{unit.words.forEach(w=>{testQuestions.push({word:w.eng, answer:w.tr})})}); shuffleArray(testQuestions); currentTestIndex=0; showTestQuestion();} function showTestQuestion(){ const q = testQuestions[currentTestIndex]; document.getElementById('test-word').textContent = q.word; const optionsEl = document.getElementById('test-options'); optionsEl.innerHTML=''; const answers=[q.answer]; while(answers.length<4){ let randomUnit = units[Math.floor(Math.random()*units.length)]; let randomWord = randomUnit.words[Math.floor(Math.random()randomUnit.words.length)].tr; if(!answers.includes(randomWord)) answers.push(randomWord); } shuffleArray(answers); answers.forEach(opt=>{const b=document.createElement('button');b.textContent=opt;b.onclick=()=>{checkAnswer(opt)}; optionsEl.appendChild(b);}); document.getElementById('test-feedback').textContent=''; } function checkAnswer(opt){ const correct=testQuestions[currentTestIndex].answer; const feedback=document.getElementById('test-feedback'); if(opt===correct){feedback.textContent='✅ Doğru'; new Audio('https://freesound.org/data/previews/331/331912_3248244-lq.mp3').play();} else {feedback.textContent='❌ Yanlış, Doğru: '+correct; new Audio('https://freesound.org/data/previews/256/256113_4486188-lq.mp3').play();} currentTestIndex++; if(currentTestIndex>=testQuestions.length){feedback.textContent+=' | Test bitti!'; return;} setTimeout(showTestQuestion,1500); } function shuffleArray(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()(i+1)); [a[i],a[j]]=[a[j],a[i]];}} </script>

</body>
</html>
