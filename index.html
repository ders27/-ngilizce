<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Çocuk İngilizce Öğrenme</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f6ff;
margin:0;
padding:0;
}

h1{
background:#4CAF50;
color:white;
padding:15px;
margin:0;
}

.menu{
margin-top:40px;
}

button{
padding:15px 25px;
margin:10px;
font-size:20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
}

.wordbox{
margin-top:120px;
font-size:50px;
background:white;
padding:40px;
border-radius:15px;
width:80%;
margin-left:auto;
margin-right:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.translate{
font-size:35px;
margin-top:20px;
color:#444;
}

.controls{
margin-top:80px;
}

.arrow{
font-size:30px;
padding:20px 40px;
}

.testbox{
font-size:35px;
margin-top:60px;
}

.option{
display:block;
margin:15px auto;
width:70%;
font-size:25px;
padding:15px;
background:white;
color:black;
border:2px solid #4CAF50;
}

.score{
font-size:25px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>📚 İngilizce Öğren</h1>

<div id="menu" class="menu">

<button onclick="openWords()">📚 Kelimeler</button>

<button onclick="openTest()">🧠 Test</button>

</div>

<div id="wordPage" style="display:none">

<div class="wordbox" onclick="showTranslation()">

<div id="english"></div>

<div id="turkish" class="translate"></div>

</div>

<div class="controls">

<button class="arrow" onclick="prevWord()">⬅️</button>

<button onclick="backMenu()">🏠</button>

<button class="arrow" onclick="nextWord()">➡️</button>

</div>

</div>


<div id="testPage" style="display:none">

<div class="testbox" id="question"></div>

<div id="options"></div>

<div class="score" id="score"></div>

<button onclick="backMenu()">🏠</button>

</div>

<script>

let words=[
["hello","merhaba"],
["good morning","günaydın"],
["good night","iyi geceler"],
["goodbye","güle güle"],
["thank you","teşekkürler"],
["please","lütfen"],
["sorry","özür dilerim"],
["yes","evet"],
["no","hayır"],
["welcome","hoşgeldin"],

["one","bir"],
["two","iki"],
["three","üç"],
["four","dört"],
["five","beş"],
["six","altı"],
["seven","yedi"],
["eight","sekiz"],
["nine","dokuz"],
["ten","on"],

["house","ev"],
["room","oda"],
["door","kapı"],
["window","pencere"],
["bed","yatak"],
["table","masa"],
["chair","sandalye"],
["kitchen","mutfak"],
["bathroom","banyo"],
["garden","bahçe"],

["food","yemek"],
["water","su"],
["milk","süt"],
["bread","ekmek"],
["cheese","peynir"],
["egg","yumurta"],
["salt","tuz"],
["sugar","şeker"],
["tea","çay"],
["coffee","kahve"],

["school","okul"],
["teacher","öğretmen"],
["student","öğrenci"],
["book","kitap"],
["pen","kalem"],
["pencil","kurşun kalem"],
["bag","çanta"],
["board","tahta"],
["lesson","ders"],
["exam","sınav"],

["eat","yemek"],
["drink","içmek"],
["sleep","uyumak"],
["run","koşmak"],
["walk","yürümek"],
["play","oynamak"],
["read","okumak"],
["write","yazmak"],
["listen","dinlemek"],
["watch","izlemek"],

["mother","anne"],
["father","baba"],
["sister","kız kardeş"],
["brother","erkek kardeş"],
["baby","bebek"],
["family","aile"],
["aunt","teyze"],
["uncle","amca"],
["son","oğul"],
["daughter","kız"],

["apple","elma"],
["banana","muz"],
["orange","portakal"],
["grape","üzüm"],
["tomato","domates"],
["potato","patates"],
["carrot","havuç"],
["rice","pirinç"],
["cake","pasta"],
["chocolate","çikolata"],

["cat","kedi"],
["dog","köpek"],
["bird","kuş"],
["fish","balık"],
["cow","inek"],
["lion","aslan"],
["tiger","kaplan"],
["elephant","fil"],
["rabbit","tavşan"],
["bear","ayı"],

["what","ne"],
["where","nerede"],
["when","ne zaman"],
["why","neden"],
["how","nasıl"],
["who","kim"],
["come","gel"],
["go","git"],
["stop","dur"],
["help","yardım"]

];

let index=0;

function openWords(){

document.getElementById("menu").style.display="none";
document.getElementById("wordPage").style.display="block";

loadWord();

}

function loadWord(){

document.getElementById("english").innerText=words[index][0];
document.getElementById("turkish").innerText="";

}

function showTranslation(){

document.getElementById("turkish").innerText=words[index][1];

playPop();

}

function nextWord(){

index++;

if(index>=words.length) index=0;

loadWord();

}

function prevWord(){

index--;

if(index<0) index=words.length-1;

loadWord();

}

function backMenu(){

location.reload();

}

let score=0;

function openTest(){

document.getElementById("menu").style.display="none";
document.getElementById("testPage").style.display="block";

newQuestion();

}

function newQuestion(){

let q=Math.floor(Math.random()*words.length);

let correct=words[q];

document.getElementById("question").innerText=correct[0]+" ne demek?";

let options=[];

options.push(correct);

while(options.length<4){

let r=words[Math.floor(Math.random()*words.length)];

if(!options.includes(r)) options.push(r);

}

options.sort(()=>Math.random()-0.5);

let html="";

options.forEach(o=>{

html+=`<button class="option" onclick="checkAnswer('${o[1]}','${correct[1]}')">${o[1]}</button>`;

});

document.getElementById("options").innerHTML=html;

document.getElementById("score").innerText="Puan: "+score;

}

function checkAnswer(a,b){

if(a==b){

score+=10;

playCorrect();

}else{

playWrong();

}

setTimeout(newQuestion,700);

}

function playCorrect(){

let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

audio.play();

}

function playWrong(){

let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

audio.play();

}

function playPop(){

let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

audio.play();

}

</script>

</body>
</html>
