<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İngilizce Öğren - Yeni Nesil</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f6ff;
            text-align: center;
            margin: 0;
        }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        h1 { background: #4CAF50; color: white; padding: 15px; margin: 0; border-bottom: 5px solid #388E3C; }
        
        button {
            width: 90%;
            padding: 15px;
            margin: 8px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }

        .wordbox {
            margin-top: 30px;
            font-size: 35px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .correct-bg { background: #c8e6c9 !important; }
        .wrong-bg { background: #ffcdd2 !important; }
        .translate { font-size: 26px; margin-top: 15px; color: #4CAF50; font-weight: bold; }

        .controls { margin-top: 20px; display: flex; justify-content: center; }
        .arrow { width: 40%; font-size: 25px; background: #2196F3; }

        .option {
            display: block;
            margin: 10px auto;
            width: 90%;
            font-size: 18px;
            padding: 15px;
            background: white;
            color: #333;
            border: 3px solid #4CAF50;
            border-radius: 15px;
        }
        
        #questionArea { margin-top: 20px; padding: 10px; }
        .stage-label { color: #2196F3; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<h1>📚 İngilizce Öğren</h1>

<div class="container">
    <div id="menu">
        <button onclick="openUnits()">📚 Üniteler (Kelimeler)</button>
        <button onclick="openTest()">🧠 Karma Test (Diyalog & Soru)</button>
    </div>

    <div id="units" style="display:none">
        <div id="unitButtons"></div>
        <button onclick="backMenu()" style="background:#666">🏠 Menü</button>
    </div>

    <div id="wordPage" style="display:none">
        <div id="wordCard" class="wordbox" onclick="showTranslation()">
            <div id="english"></div>
            <div id="turkish" class="translate"></div>
            <div style="font-size:14px; color:#999; margin-top:10px;">(Dinle ve Anlamı Gör)</div>
        </div>
        <div class="controls">
            <button class="arrow" onclick="prevWord()">⬅️</button>
            <button class="arrow" onclick="nextWord()">➡️</button>
        </div>
        <button onclick="openUnits()" style="background:#666; margin-top:20px;">⬅️ Üniteler</button>
    </div>

    <div id="testPage" style="display:none">
        <div id="questionArea">
            <span id="stageLabel" class="stage-label"></span>
            <h2 id="questionText"></h2>
        </div>
        <div id="options"></div>
        <button onclick="backMenu()" style="background:#666; margin-top:20px;">🏠 Menü</button>
    </div>
</div>

<script>
const units = {
    greetings: { title: "Greetings (Selamlaşma)", data: [["hello","merhaba"], ["good morning","günaydın"], ["thank you","teşekkürler"], ["please","lütfen"]] },
    numbers: { title: "Numbers (Sayılar)", data: [["one","bir"], ["ten","on"], ["twenty","yirmi"], ["thirty","otuz"]] },
    home: { title: "Home (Ev)", data: [["house","ev"], ["door","kapı"], ["window","pencere"], ["bed","yatak"]] },
    verbs: { title: "Verbs (Fiiller)", data: [["eat","yemek"], ["drink","içmek"], ["run","koşmak"], ["walk","yürümek"]] },
    animals: { title: "Animals (Hayvanlar)", data: [["cat","kedi"], ["dog","köpek"], ["elephant","fil"], ["bird","kuş"]] }
};

// Gönderdiğin görsellerden ilham alınan soru seti
const customQuestions = [
    { q: "Give me the ruler, please. - ____?", a: "The ruler, please.", options: ["The ruler, please.", "No, thank you.", "I am Japanese."] },
    { q: "An elephant can ____.", a: "walk", options: ["walk", "fly", "swim"] },
    { q: "It is rainy today. ____ your umbrella.", a: "Take", options: ["Take", "Wear", "Open"] },
    { q: "I am a vet. I like ____.", a: "helping animals", options: ["helping animals", "driving cars", "teaching"] },
    { q: "Where is Sinop?", a: "It is in the north.", options: ["It is in the north.", "It is in the west.", "It is in the south."] },
    { q: "What is your name?", a: "My name is Cody.", options: ["My name is Cody.", "I am French.", "I am from Britain."] }
];

let current = [];
let index = 0;
let testStage = 1;

function createUnitButtons() {
    const container = document.getElementById("unitButtons");
    container.innerHTML = "";
    for (let key in units) {
        let btn = document.createElement("button");
        btn.innerText = units[key].title;
        btn.onclick = () => startUnit(key);
        container.appendChild(btn);
    }
}
createUnitButtons();

function speak(text) {
    const msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = 'en-US';
    window.speechSynthesis.speak(msg);
}

function openUnits() { hideAll(); document.getElementById("units").style.display = "block"; }

function startUnit(name) {
    current = units[name].data;
    index = 0;
    hideAll();
    document.getElementById("wordPage").style.display = "block";
    loadWord();
}

function loadWord() {
    const card = document.getElementById("wordCard");
    card.classList.remove("correct-bg");
    document.getElementById("english").innerText = current[index][0];
    document.getElementById("turkish").innerText = "";
    speak(current[index][0]);
}

function showTranslation() {
    const card = document.getElementById("wordCard");
    card.classList.add("correct-bg");
    document.getElementById("turkish").innerText = current[index][1];
    speak(current[index][0]);
}

function nextWord() { index = (index + 1) % current.length; loadWord(); }
function prevWord() { index = (index - 1 + current.length) % current.length; loadWord(); }

function openTest() {
    hideAll();
    document.getElementById("testPage").style.display = "block";
    newQuestion();
}

function newQuestion() {
    const label = document.getElementById("stageLabel");
    const questionText = document.getElementById("questionText");
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    // %50 şansla kelime veya diyalog sorusu gelsin
    testStage = Math.random() > 0.5 ? 1 : 2;

    if (testStage === 1) {
        label.innerText = "KELİME BİLGİSİ";
        let allWords = Object.values(units).map(u => u.data).flat();
        let q = allWords[Math.floor(Math.random() * allWords.length)];
        questionText.innerText = `"${q[0]}" ne demek?`;
        speak(q[0]);

        let opts = [q[1]];
        while (opts.length < 3) {
            let r = allWords[Math.floor(Math.random() * allWords.length)][1];
            if (!opts.includes(r)) opts.push(r);
        }
        renderOptions(opts, q[1]);
    } else {
        label.innerText = "DİYALOG & MANTIK";
        let q = customQuestions[Math.floor(Math.random() * customQuestions.length)];
        questionText.innerText = q.q;
        speak(q.q);
        renderOptions(q.options, q.a);
    }
}

function renderOptions(opts, correct) {
    const optionsDiv = document.getElementById("options");
    opts.sort(() => Math.random() - 0.5);
    opts.forEach(o => {
        let btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = o;
        btn.onclick = () => checkAnswer(btn, o, correct);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct) {
    if (selected === correct) {
        btn.style.background = "#c8e6c9";
        playCorrect();
        setTimeout(newQuestion, 1000);
    } else {
        btn.style.background = "#ffcdd2";
        playWrong();
    }
}

function playCorrect() { new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play().catch(()=>{}); }
function playWrong() { new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play().catch(()=>{}); }
function backMenu() { hideAll(); document.getElementById("menu").style.display = "block"; }

function hideAll() {
    ["menu", "units", "wordPage", "testPage"].forEach(id => {
        document.getElementById(id).style.display = "none";
    });
}
</script>

</body>
</html>
