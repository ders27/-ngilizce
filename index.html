<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Kelime ve Test</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f8f4e3, #e0f7fa);
    display: flex;
    justify-content: center;
    padding: 20px;
}
#app {
    width: 100%;
    max-width: 750px;
    text-align: center;
}
h1,h2 {color:#00796B;}
button {
    margin:5px;
    padding:10px 18px;
    font-size:1.1em;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background-color:#00796B;
    color:white;
}
button:hover {background-color:#009688;}
.word-card {
    background:#ffffff;
    border:2px solid #004D40;
    border-radius:15px;
    padding:40px 20px;
    margin:50px 0;
    font-size:2.5em;
    cursor:pointer;
    transition:0.3s;
}
.word-card:hover {background:#B2DFDB;}
#menu-buttons button {width:160px;margin:5px;}
.block-button {width:120px;margin:3px;background:#004D40;}
.block-button:hover {background:#00796B;}
#test-section .test-option {
    display:block;
    margin:10px auto;
    padding:10px 15px;
    width:80%;
    border-radius:6px;
    background:#E0F2F1;
    border:2px solid #004D40;
    font-size:1.1em;
}
#test-section .correct {background:#8BC34A;color:white;}
#test-section .incorrect {background:#EF5350;color:white;}
#word-meaning {margin-top:20px;font-size:1.5em;color:#004D40;}
</style>
</head>
<body>
<div id="app">

    <div id="screen-menu">
        <h1>Kelime Macerası</h1>
        <div id="menu-buttons">
            <button onclick="startLearning()">📖 Kelime Öğren</button>
            <button onclick="startTest()">📝 Test</button>
        </div>
        <h3>Kelime Blokları</h3>
        <div id="block-buttons"></div>
    </div>

    <div id="screen-learn" style="display:none">
        <h2 id="block-title">Blok Başlığı</h2>
        <div class="word-card" id="word-card" onclick="showMeaning()"></div>
        <div id="word-meaning"></div>
        <div>
            <button onclick="prevWord()">⬅️</button>
            <button onclick="nextWord()">➡️</button>
            <button onclick="goMenu()">🏠</button>
        </div>
    </div>

    <div id="screen-test" style="display:none">
        <h2>📝 Kelime Testi</h2>
        <div id="test-word" style="font-size:2em;margin:20px;"></div>
        <div id="test-options"></div>
        <p id="test-feedback" style="font-weight:bold;"></p>
        <button onclick="nextTest()">Sonraki</button>
        <button onclick="goMenu()">🏠 Menü</button>
    </div>

    <audio id="correct-sound" src="sounds/correct.mp3"></audio>
    <audio id="incorrect-sound" src="sounds/incorrect.mp3"></audio>

</div>

<script>
// Kelime listesi ve blok başlıkları
const wordBlocks = [

    {english:"Hello", turkish:"Merhaba"},

    {english:"Good night", turkish:"İyi geceler"},
    {english:"Goodbye", turkish:"Güle güle"},
    {english:"Please", turkish:"Lütfen"},
    {english:"Thank you", turkish:"Teşekkür ederim"},
    {english:"Yes", turkish:"Evet"},
    {english:"No", turkish:"Hayır"},
    {english:"Excuse me", turkish:"Afedersiniz"},
    {english:"Sorry", turkish:"Üzgünüm"}
  ]},
  {title:"Sayılar", words:[
    {english:"One", turkish:"Bir"},
    {english:"Two", turkish:"İki"},
    {english:"Three", turkish:"Üç"},
    {english:"Four", turkish:"Dört"},
    {english:"Five", turkish:"Beş"},
    {english:"Six", turkish:"Altı"},
    {english:"Seven", turkish:"Yedi"},
    {english:"Eight", turkish:"Sekiz"},
    {english:"Nine", turkish:"Dokuz"},
    {english:"Ten", turkish:"On"}
  ]},
  {title:"Ev & Mutfak", words:[
    {english:"Water", turkish:"Su"},
    {english:"Food", turkish:"Yemek"},
    {english:"Milk", turkish:"Süt"},
    {english:"Bread", turkish:"Ekmek"},
    {english:"Apple", turkish:"Elma"},
    {english:"Chair", turkish:"Sandalye"},
    {english:"Table", turkish:"Masa"},
    {english:"Bed", turkish:"Yatak"},
    {english:"Window", turkish:"Pencere"},
    {english:"Door", turkish:"Kapı"}
  ]},
  {title:"Okul & Sınıf", words:[
    {english:"School", turkish:"Okul"},
    {english:"Teacher", turkish:"Öğretmen"},
    {english:"Student", turkish:"Öğrenci"},
    {english:"Book", turkish:"Kitap"},
    {english:"Pen", turkish:"Kalem"},
    {english:"Notebook", turkish:"Defter"},
    {english:"Bag", turkish:"Çanta"},
    {english:"Lesson", turkish:"Ders"},
    {english:"Class", turkish:"Sınıf"},
    {english:"Desk", turkish:"Sıra"}
  ]},
  {title:"Hava Durumu", words:[
    {english:"Sunny", turkish:"Güneşli"},
    {english:"Rainy", turkish:"Yağmurlu"},
    {english:"Cloudy", turkish:"Bulutlu"},
    {english:"Snowy", turkish:"Karlı"},
    {english:"Windy", turkish:"Rüzgarlı"},
    {english:"Hot", turkish:"Sıcak"},
    {english:"Cold", turkish:"Soğuk"},
    {english:"Stormy", turkish:"Fırtınalı"},
    {english:"Foggy", turkish:"Sisli"},
    {english:"Humid", turkish:"Nemli"}
  ]},
  {title:"Mevsimler", words:[
    {english:"Spring", turkish:"İlkbahar"},
    {english:"Summer", turkish:"Yaz"},
    {english:"Autumn", turkish:"Sonbahar"},
    {english:"Winter", turkish:"Kış"},
    {english:"Season", turkish:"Mevsim"},
    {english:"Month", turkish:"Ay"},
    {english:"Day", turkish:"Gün"},
    {english:"Night", turkish:"Gece"},
    {english:"Morning", turkish:"Sabah"},
    {english:"Evening", turkish:"Akşam"}
  ]},
  {title:"Yönler", words:[
    {english:"North", turkish:"Kuzey"},
    {english:"South", turkish:"Güney"},
    {english:"East", turkish:"Doğu"},
    {english:"West", turkish:"Batı"},
    {english:"Left", turkish:"Sol"},
    {english:"Right", turkish:"Sağ"},
    {english:"Up", turkish:"Yukarı"},
    {english:"Down", turkish:"Aşağı"},
    {english:"Forward", turkish:"İleri"},
    {english:"Backward", turkish:"Geri"}
  ]},
  {title:"Hayvanlar", words:[
    {english:"Cat", turkish:"Kedi"},
    {english:"Dog", turkish:"Köpek"},
    {english:"Bird", turkish:"Kuş"},
    {english:"Fish", turkish:"Balık"},
    {english:"Horse", turkish:"At"},
    {english:"Cow", turkish:"İnek"},
    {english:"Sheep", turkish:"Koyun"},
    {english:"Pig", turkish:"Domuz"},
    {english:"Rabbit", turkish:"Tavşan"},
    {english:"Mouse", turkish:"Fare"}
  ]},
  {title:"Renkler & Fiiller", words:[
    {english:"Red", turkish:"Kırmızı"},
    {english:"Blue", turkish:"Mavi"},
    {english:"Green", turkish:"Yeşil"},
    {english:"Yellow", turkish:"Sarı"},
    {english:"Run", turkish:"Koşmak"},
    {english:"Walk", turkish:"Yürümek"},
    {english:"Eat", turkish:"Yemek yemek"},
    {english:"Drink", turkish:"İçmek"},
    {english:"Sleep", turkish:"Uyumak"},
    {english:"Read", turkish:"Okumak"}
  ]}
];

let currentBlock = 0;
let currentWord = 0;

function renderBlockButtons(){
    const blockButtons = document.getElementById("block-buttons");
    blockButtons.innerHTML="";
    wordBlocks.forEach((b,i)=>{
        let btn=document.createElement("button");
        btn.className="block-button";
        btn.innerText=b.title;
        btn.onclick=()=>{currentBlock=i; startLearning();}
        blockButtons.appendChild(btn);
    });
}

function startLearning(){
    document.getElementById("screen-menu").style.display="none";
    document.getElementById("screen-learn").style.display="block";
    currentWord=0;
    document.getElementById("block-title").innerText=wordBlocks[currentBlock].title;
    showWord();
    document.getElementById("word-meaning").innerText="";
}

function showWord(){
    const word = wordBlocks[currentBlock].words[currentWord];
    document.getElementById("word-card").innerText=word.english;
    document.getElementById("word-meaning").innerText="";
}

function showMeaning(){
    const word = wordBlocks[currentBlock].words[currentWord];
    document.getElementById("word-meaning").innerText=word.turkish;
}

function nextWord(){
    if(currentWord<wordBlocks[currentBlock].words.length-1){
        currentWord++;
        showWord();
    }
}
function prevWord(){
    if(currentWord>0){
        currentWord--;
        showWord();
    }
}

function goMenu(){
    document.getElementById("screen-learn").style.display="none";
    document.getElementById("screen-test").style.display="none";
    document.getElementById("screen-menu").style.display="block";
}

renderBlockButtons();

// Test bölümü
let testIndex = 0;
let testAnswers = [];
function startTest(){
    document.getElementById("screen-menu").style.display="none";
    document.getElementById("screen-test").style.display="block";
    testIndex=0; testAnswers=[];
    renderTest();
}

function renderTest(){
    const word = words[testIndex];
    document.getElementById("test-word").innerText=word.english;
    const optionsDiv = document.getElementById("test-options");
    optionsDiv.innerHTML="";
    let choices=[word.turkish];
    while(choices.length<4){
        let rand = words[Math.floor(Math.random()*words.length)].turkish;
        if(!choices.includes(rand)) choices.push(rand);
    }
    choices.sort(()=>Math.random()-0.5);
    choices.forEach(c=>{
        let btn=document.createElement("button");
        btn.className="test-option";
        btn.innerText=c;
        btn.onclick=()=>checkAnswer(btn,c,word.turkish);
        optionsDiv.appendChild(btn);
    });
    document.getElementById("test-feedback").innerText="";
}

function checkAnswer(button,opt,answer){
    if(opt===answer){
        button.classList.add("correct");
        document.getElementById("test-feedback").innerText="Doğru!";
        document.getElementById("correct-sound").play();
    }else{
        button.classList.add("incorrect");
        document.getElementById("test-feedback").innerText=`Yanlış! Doğru: ${answer}`;
        document.getElementById("incorrect-sound").play();
    }
}

function nextTest(){
    if(testIndex<words.length-1){
        testIndex++;
        renderTest();
    }else{
        alert("Test tamamlandı!");
        goMenu();
    }
}

</script>
</body>
</html>
