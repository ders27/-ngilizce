<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çocuk İngilizce</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f6ff;
            text-align: center;
            margin: 0;
            overflow-x: hidden;
        }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        h1 { background: #4CAF50; color: white; padding: 15px; margin: 0; border-bottom: 5px solid #388E3C; }
        
        button {
            width: 90%;
            padding: 15px;
            margin: 8px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }

        .wordbox {
            margin-top: 50px;
            font-size: 40px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .correct-bg { background: #c8e6c9 !important; }
        .wrong-bg { background: #ffcdd2 !important; }

        .translate { font-size: 28px; margin-top: 20px; color: #4CAF50; font-weight: bold; }
        .controls { margin-top: 30px; display: flex; justify-content: center; }
        .arrow { width: 40%; font-size: 25px; background: #2196F3; }

        .option {
            display: block;
            margin: 10px auto;
            width: 90%;
            font-size: 20px;
            padding: 15px;
            background: white;
            color: #333;
            border: 3px solid #4CAF50;
            border-radius: 15px;
        }
        
        #questionArea { margin-top: 20px; padding: 10px; }
        .stage-label { color: #2196F3; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<h1>📚 İngilizce Öğren</h1>

<div class="container">
    <div id="menu">
        <button onclick="openUnits()">📚 Kelimeler (Kategoriler)</button>
        <button onclick="openTest()">🧠 İki Aşamalı Test</button>
    </div>

    <div id="units" style="display:none">
        <div id="unitButtons"></div>
        <button onclick="backMenu()" style="background:#666">🏠 Menü</button>
    </div>

    <div id="wordPage" style="display:none">
        <div id="wordCard" class="wordbox" onclick="showTranslation()">
            <div id="english"></div>
            <div id="turkish" class="translate"></div>
            <div style="font-size:14px; color:#999; margin-top:10px;">(Dinlemek ve Anlamı İçin Dokun)</div>
        </div>
        <div class="controls">
            <button class="arrow" onclick="prevWord()">⬅️</button>
            <button class="arrow" onclick="nextWord()">➡️</button>
        </div>
        <button onclick="openUnits()" style="background:#666; margin-top:20px;">⬅️ Üniteler</button>
    </div>

    <div id="testPage" style="display:none">
        <div id="questionArea">
            <span id="stageLabel" class="stage-label"></span>
            <h2 id="questionText"></h2>
        </div>
        <div id="options"></div>
        <button onclick="backMenu()" style="background:#666; margin-top:20px;">🏠 Menü</button>
    </div>
</div>

<script>
const units = {
    greetings: { title: "Greetings (Selamlaşma)", data: [["hello","merhaba"], ["good morning","günaydın"], ["goodbye","güle güle"], ["thank you","teşekkürler"], ["please","lütfen"]] },
    numbers: { title: "Numbers (Sayılar)", data: [["one","bir"], ["two","iki"], ["three","üç"], ["four","dört"], ["five","beş"]] },
    home: { title: "Home (Ev)", data: [["house","ev"], ["door","kapı"], ["window","pencere"], ["bed","yatak"], ["table","masa"]] },
    kitchen: { title: "Kitchen (Mutfak)", data: [["water","su"], ["milk","süt"], ["bread","ekmek"], ["cheese","peynir"], ["egg","yumurta"]] },
    school: { title: "School (Okul)", data: [["teacher","öğretmen"], ["student","öğrenci"], ["book","kitap"], ["pen","kalem"], ["bag","çanta"]] },
    verbs: { title: "Verbs (Fiiller)", data: [["eat","yemek yemek"], ["drink","içmek"], ["sleep","uyumak"], ["run","koşmak"], ["play","oynamak"]] },
    family: { title: "Family (Aile)", data: [["mother","anne"], ["father","baba"], ["sister","kız kardeş"], ["brother","erkek kardeş"], ["baby","bebek"]] },
    food: { title: "Food (Yiyecek)", data: [["apple","elma"], ["banana","muz"], ["orange","portakal"], ["cake","pasta"], ["chocolate","çikolata"]] },
    animals: { title: "Animals (Hayvanlar)", data: [["cat","kedi"], ["dog","köpek"], ["bird","kuş"], ["fish","balık"], ["lion","aslan"]] },
    daily: { title: "Daily (Günlük)", data: [["what","ne"], ["where","nerede"], ["how","nasıl"], ["stop","dur"], ["help","yardım"]] }
};

// Cümle Testi Soruları
const sentenceQuestions = [
    { q: "How are you?", a: "Nasılsın?", options: ["Nasılsın?", "Adın ne?", "Kaç yaşındasın?"] },
    { q: "What is this?", a: "Bu nedir?", options: ["Bu nedir?", "Nereye gidiyorsun?", "Kim o?"] },
    { q: "Where is the cat?", a: "Kedi nerede?", options: ["Kedi nerede?", "Kedi ne yiyor?", "Bu bir kedi mi?"] },
    { q: "I like apples.", a: "Elmaları severim.", options: ["Elmaları severim.", "Elma yiyorum.", "Elma nerede?"] },
    { q: "Open the door.", a: "Kapıyı aç.", options: ["Kapıyı aç.", "Pencereyi kapat.", "Eve git."] }
];

let current = [];
let index = 0;
let testStage = 1; // 1: Kelime, 2: Cümle

function createUnitButtons() {
    const container = document.getElementById("unitButtons");
    container.innerHTML = "";
    for (let key in units) {
        let btn = document.createElement("button");
        btn.innerText = units[key].title;
        btn.onclick = () => startUnit(key);
        container.appendChild(btn);
    }
}
createUnitButtons();

function speak(text) {
    const msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = 'en-US';
    window.speechSynthesis.speak(msg);
}

function openUnits() { hideAll(); document.getElementById("units").style.display = "block"; }

function startUnit(name) {
    current = units[name].data;
    index = 0;
    hideAll();
    document.getElementById("wordPage").style.display = "block";
    loadWord();
}

function loadWord() {
    const card = document.getElementById("wordCard");
    card.classList.remove("correct-bg");
    document.getElementById("english").innerText = current[index][0];
    document.getElementById("turkish").innerText = "";
    speak(current[index][0]);
}

function showTranslation() {
    const card = document.getElementById("wordCard");
    card.classList.add("correct-bg");
    document.getElementById("turkish").innerText = current[index][1];
    speak(current[index][0]);
}

function nextWord() { index = (index + 1) % current.length; loadWord(); }
function prevWord() { index = (index - 1 + current.length) % current.length; loadWord(); }

function openTest() {
    testStage = 1;
    hideAll();
    document.getElementById("testPage").style.display = "block";
    newQuestion();
}

function newQuestion() {
    const label = document.getElementById("stageLabel");
    const questionText = document.getElementById("questionText");
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    if (testStage === 1) {
        label.innerText = "1. AŞAMA: KELİME BİLGİSİ";
        let all = Object.values(units).map(u => u.data).flat();
        let q = all[Math.floor(Math.random() * all.length)];
        questionText.innerText = `"${q[0]}" ne demek?`;
        speak(q[0]);

        let opts = [q];
        while (opts.length < 3) {
            let r = all[Math.floor(Math.random() * all.length)];
            if (!opts.some(o => o[1] === r[1])) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            optionsDiv.innerHTML += `<button class="option" onclick="checkAnswer(this, '${o[1]}', '${q[1]}')">${o[1]}</button>`;
        });
    } else {
        label.innerText = "2. AŞAMA: CÜMLE KURMA";
        let q = sentenceQuestions[Math.floor(Math.random() * sentenceQuestions.length)];
        questionText.innerText = `"${q[q]}" cümlesinin anlamı nedir?`;
        speak(q.q);

        let opts = [...q.options].sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            optionsDiv.innerHTML += `<button class="option" onclick="checkAnswer(this, '${o}', '${q.a}')">${o}</button>`;
        });
    }
}

function checkAnswer(btn, selected, correct) {
    if (selected === correct) {
        btn.style.background = "#c8e6c9";
        playCorrect();
        // Eğer 1. aşamadaysa rastgele 2. aşamaya geçebilir veya devam eder
        if (testStage === 1 && Math.random() > 0.7) testStage = 2;
        else if (testStage === 2) testStage = 1; // Döngüsel geçiş
        
        setTimeout(newQuestion, 1000);
    } else {
        btn.style.background = "#ffcdd2";
        playWrong();
    }
}

function playCorrect() { new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play().catch(()=>{}); }
function playWrong() { new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play().catch(()=>{}); }
function backMenu() { hideAll(); document.getElementById("menu").style.display = "block"; }

function hideAll() {
    ["menu", "units", "wordPage", "testPage"].forEach(id => {
        document.getElementById(id).style.display = "none";
    });
}
</script>

</body>
</html>
