<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çocuk İngilizce</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f6ff;
            text-align: center;
            margin: 0;
            overflow-x: hidden;
        }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        h1 { background: #4CAF50; color: white; padding: 15px; margin: 0; border-bottom: 5px solid #388E3C; }
        
        button {
            width: 90%;
            padding: 15px;
            margin: 8px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }

        /* Kelime Kutusu */
        .wordbox {
            margin-top: 50px;
            font-size: 45px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: background 0.3s;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* Doğru/Yanlış Renkleri */
        .correct-bg { background: #c8e6c9 !important; }
        .wrong-bg { background: #ffcdd2 !important; }

        .translate {
            font-size: 30px;
            margin-top: 20px;
            color: #4CAF50;
            font-weight: bold;
        }

        .controls { margin-top: 30px; display: flex; justify-content: center; }
        .arrow { width: 40%; font-size: 25px; background: #2196F3; }

        /* Test Şıkları */
        .option {
            display: block;
            margin: 10px auto;
            width: 90%;
            font-size: 22px;
            padding: 15px;
            background: white;
            color: #333;
            border: 3px solid #4CAF50;
            border-radius: 15px;
        }
        
        #question { margin-top: 20px; color: #333; }
    </style>
</head>
<body>

<h1>📚 İngilizce Öğren</h1>

<div class="container">
    <div id="menu">
        <button onclick="openUnits()">📚 Kelimeler</button>
        <button onclick="openTest()">🧠 Test</button>
    </div>

    <div id="units" style="display:none">
        <div id="unitButtons"></div>
        <button onclick="backMenu()" style="background:#666">🏠 Menü</button>
    </div>

    <div id="wordPage" style="display:none">
        <div id="wordCard" class="wordbox" onclick="showTranslation()">
            <div id="english"></div>
            <div id="turkish" class="translate"></div>
            <div style="font-size:14px; color:#999; margin-top:10px;">(Dinlemek için dokun)</div>
        </div>

        <div class="controls">
            <button class="arrow" onclick="prevWord()">⬅️</button>
            <button class="arrow" onclick="nextWord()">➡️</button>
        </div>
        <button onclick="openUnits()" style="background:#666; margin-top:20px;">⬅️ Üniteler</button>
    </div>

    <div id="testPage" style="display:none">
        <h2 id="question"></h2>
        <div id="options"></div>
        <button onclick="backMenu()" style="background:#666; margin-top:20px;">🏠 Menü</button>
    </div>
</div>

<script>
const units = {
    greetings: [["hello","merhaba"], ["good morning","günaydın"], ["good night","iyi geceler"], ["goodbye","güle güle"], ["thank you","teşekkürler"], ["please","lütfen"], ["sorry","özür dilerim"], ["yes","evet"], ["no","hayır"], ["welcome","hoşgeldin"]],
    numbers: [["one","bir"], ["two","iki"], ["three","üç"], ["four","dört"], ["five","beş"], ["six","altı"], ["seven","yedi"], ["eight","sekiz"], ["nine","dokuz"], ["ten","on"]],
    home: [["house","ev"], ["room","oda"], ["door","kapı"], ["window","pencere"], ["bed","yatak"], ["table","masa"], ["chair","sandalye"], ["kitchen","mutfak"], ["bathroom","banyo"], ["garden","bahçe"]],
    kitchen: [["food","yemek"], ["water","su"], ["milk","süt"], ["bread","ekmek"], ["cheese","peynir"], ["egg","yumurta"], ["salt","tuz"], ["sugar","şeker"], ["tea","çay"], ["coffee","kahve"]],
    school: [["school","okul"], ["teacher","öğretmen"], ["student","öğrenci"], ["book","kitap"], ["pen","kalem"], ["pencil","kurşun kalem"], ["bag","çanta"], ["board","tahta"], ["lesson","ders"], ["exam","sınav"]],
    verbs: [["eat","yemek"], ["drink","içmek"], ["sleep","uyumak"], ["run","koşmak"], ["walk","yürümek"], ["play","oynamak"], ["read","okumak"], ["write","yazmak"], ["listen","dinlemek"], ["watch","izlemek"]],
    family: [["mother","anne"], ["father","baba"], ["sister","kız kardeş"], ["brother","erkek kardeş"], ["baby","bebek"], ["family","aile"], ["aunt","teyze"], ["uncle","amca"], ["son","oğul"], ["daughter","kız"]],
    food: [["apple","elma"], ["banana","muz"], ["orange","portakal"], ["grape","üzüm"], ["tomato","domates"], ["potato","patates"], ["carrot","havuç"], ["rice","pirinç"], ["cake","pasta"], ["chocolate","çikolata"]],
    animals: [["cat","kedi"], ["dog","köpek"], ["bird","kuş"], ["fish","balık"], ["cow","inek"], ["lion","aslan"], ["tiger","kaplan"], ["elephant","fil"], ["rabbit","tavşan"], ["bear","ayı"]],
    daily: [["what","ne"], ["where","nerede"], ["when","ne zaman"], ["why","neden"], ["how","nasıl"], ["who","kim"], ["come","gel"], ["go","git"], ["stop","dur"], ["help","yardım"]]
};

let current = [];
let index = 0;

// Ünite butonlarını otomatik oluştur
function createUnitButtons() {
    const container = document.getElementById("unitButtons");
    container.innerHTML = "";
    for (let key in units) {
        let btn = document.createElement("button");
        btn.innerText = key.toUpperCase();
        btn.onclick = () => startUnit(key);
        container.appendChild(btn);
    }
}
createUnitButtons();

function speak(text) {
    const msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = 'en-US'; 
    window.speechSynthesis.speak(msg);
}

function openUnits() {
    hideAll();
    document.getElementById("units").style.display = "block";
}

function startUnit(name) {
    current = units[name];
    index = 0;
    hideAll();
    document.getElementById("wordPage").style.display = "block";
    loadWord();
}

function loadWord() {
    const card = document.getElementById("wordCard");
    card.classList.remove("correct-bg");
    document.getElementById("english").innerText = current[index][0];
    document.getElementById("turkish").innerText = "";
    speak(current[index][0]); // Kelime açıldığında oku
}

function showTranslation() {
    const card = document.getElementById("wordCard");
    card.classList.add("correct-bg"); // Renk değiştir
    document.getElementById("turkish").innerText = current[index][1];
    speak(current[index][0]); // Tıklayınca tekrar oku
}

function nextWord() {
    index = (index + 1) % current.length;
    loadWord();
}

function prevWord() {
    index = (index - 1 + current.length) % current.length;
    loadWord();
}

function openTest() {
    hideAll();
    document.getElementById("testPage").style.display = "block";
    newQuestion();
}

function newQuestion() {
    let all = Object.values(units).flat();
    let q = all[Math.floor(Math.random() * all.length)];
    
    document.getElementById("question").innerText = `"${q[0]}" ne demek?`;
    speak(q[0]);

    let options = [q];
    while (options.length < 4) {
        let r = all[Math.floor(Math.random() * all.length)];
        if (!options.some(opt => opt[1] === r[1])) options.push(r);
    }
    options.sort(() => Math.random() - 0.5);

    let html = "";
    options.forEach(o => {
        // Şık butonlarını HTML olarak oluştururken tırnak işaretlerine dikkat
        html += `<button class="option" onclick="answer(this, '${o[1]}', '${q[1]}')">${o[1]}</button>`;
    });
    document.getElementById("options").innerHTML = html;
}

function answer(btn, selected, correct) {
    if (selected === correct) {
        btn.style.background = "#c8e6c9";
        playCorrect();
        setTimeout(newQuestion, 1000);
    } else {
        btn.style.background = "#ffcdd2";
        playWrong();
    }
}

function playCorrect() {
    new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play().catch(()=>{});
}

function playWrong() {
    new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play().catch(()=>{});
}

function backMenu() { hideAll(); document.getElementById("menu").style.display = "block"; }

function hideAll() {
    ["menu", "units", "wordPage", "testPage"].forEach(id => {
        document.getElementById(id).style.display = "none";
    });
}
</script>

</body>
</html>
