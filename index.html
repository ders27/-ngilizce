<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İngilizce Öğren</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#app{
background:white;
width:90%;
max-width:600px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#ff6600;
}

.menu button{
margin:10px;
padding:15px 20px;
border:none;
border-radius:10px;
background:#2b8cff;
color:white;
font-size:16px;
cursor:pointer;
}

.menu button:hover{
background:#1c6ed6;
}

.card{
font-size:40px;
padding:40px;
background:#f4f4f4;
border-radius:10px;
cursor:pointer;
margin:30px 0;
transition:0.3s;
}

.card.show{
background:#b8ffb8;
}

.meaning{
font-size:25px;
margin-top:15px;
}

.nav button{
font-size:20px;
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#ff6600;
color:white;
cursor:pointer;
}

.testOption{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
background:#f3f3f3;
}

.testOption:hover{
background:#e4e4e4;
}

.result{
font-size:22px;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="app">

<h1>İngilizce Öğren</h1>

<div id="menu" class="menu">

<button onclick="showWords()">📚 Kelimeler</button>

<button onclick="startTest()">📝 Test</button>

</div>


<div id="learn" style="display:none">

<h2 id="topicTitle"></h2>

<div id="card" class="card" onclick="toggleMeaning()"></div>

<div id="meaning" class="meaning"></div>

<div class="nav">

<button onclick="prevWord()">⬅️</button>

<button onclick="showMenu()">🏠</button>

<button onclick="nextWord()">➡️</button>

</div>

</div>


<div id="test" style="display:none">

<h2>Karışık Test</h2>

<div class="card" id="question"></div>

<div id="options"></div>

<div class="result" id="result"></div>

<div class="nav">

<button onclick="nextQuestion()">➡️</button>

<button onclick="showMenu()">🏠</button>

</div>

</div>

</div>

<audio id="correctSound"
src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<audio id="wrongSound"
src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

const words=[

["Hello","Merhaba"],
["Good morning","Günaydın"],
["Good night","İyi geceler"],
["Goodbye","Güle güle"],
["Please","Lütfen"],
["Thank you","Teşekkür ederim"],
["Book","Kitap"],
["Pen","Kalem"],
["House","Ev"],
["Door","Kapı"],
["Table","Masa"],
["Chair","Sandalye"],
["Water","Su"],
["Bread","Ekmek"],
["Milk","Süt"],
["Apple","Elma"],
["One","Bir"],
["Two","İki"],
["Three","Üç"],
["Four","Dört"],
["Five","Beş"],
["Red","Kırmızı"],
["Blue","Mavi"],
["Green","Yeşil"],
["Yellow","Sarı"],
["Cat","Kedi"],
["Dog","Köpek"],
["Bird","Kuş"],
["Fish","Balık"],
["Cow","İnek"],
["Sunny","Güneşli"],
["Rainy","Yağmurlu"],
["Cloudy","Bulutlu"],
["Snowy","Karlı"],
["Left","Sol"],
["Right","Sağ"],
["Up","Yukarı"],
["Down","Aşağı"],
["North","Kuzey"],
["South","Güney"]

]

let index=0
let show=false

function showWords(){

document.getElementById("menu").style.display="none"
document.getElementById("learn").style.display="block"

showWord()

}

function showWord(){

let w=words[index]

document.getElementById("card").classList.remove("show")

document.getElementById("card").innerText=w[0]

document.getElementById("meaning").innerText=""

show=false

}

function toggleMeaning(){

let card=document.getElementById("card")

if(!show){

card.classList.add("show")

document.getElementById("meaning").innerText=words[index][1]

show=true

}else{

card.classList.remove("show")

document.getElementById("meaning").innerText=""

show=false

}

}

function nextWord(){

index++

if(index>=words.length)
index=0

showWord()

}

function prevWord(){

index--

if(index<0)
index=words.length-1

showWord()

}

function showMenu(){

document.getElementById("learn").style.display="none"
document.getElementById("test").style.display="none"
document.getElementById("menu").style.display="block"

}

let test=[]
let q=0

function startTest(){

document.getElementById("menu").style.display="none"
document.getElementById("test").style.display="block"

test=[...words].sort(()=>Math.random()-0.5)

q=0

showQuestion()

}

function showQuestion(){

let w=test[q]

document.getElementById("question").innerText=w[0]

let options=[w[1]]

while(options.length<4){

let r=words[Math.floor(Math.random()*words.length)][1]

if(!options.includes(r))
options.push(r)

}

options.sort(()=>Math.random()-0.5)

let box=document.getElementById("options")

box.innerHTML=""

options.forEach(o=>{

let b=document.createElement("button")

b.className="testOption"

b.innerText=o

b.onclick=()=>check(o,w[1])

box.appendChild(b)

})

document.getElementById("result").innerText=""

}

function check(a,c){

if(a==c){

document.getElementById("result").innerText="✅ Doğru"

document.getElementById("correctSound").play()

}else{

document.getElementById("result").innerText="❌ Yanlış: "+c

document.getElementById("wrongSound").play()

}

}

function nextQuestion(){

q++

if(q>=test.length)
q=0

showQuestion()

}

</script>

</body>
</html>
