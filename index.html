<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Öğren</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#app{
background:white;
width:90%;
max-width:600px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#ff6b00;
}

.menu button{
margin:5px;
padding:12px 15px;
border:none;
background:#2d8cff;
color:white;
border-radius:8px;
cursor:pointer;
}

.menu button:hover{
background:#1b6dd6;
}

.card{
font-size:40px;
margin:40px 0;
font-weight:bold;
}

.meaning{
font-size:24px;
color:#444;
margin-bottom:20px;
}

.nav button{
font-size:20px;
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#ff6b00;
color:white;
cursor:pointer;
}

.nav button:hover{
background:#e85f00;
}

.testOption{
display:block;
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
background:#f2f2f2;
}

.testOption:hover{
background:#e8e8e8;
}

.result{
font-size:20px;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="app">

<h1>İngilizce Öğren</h1>

<div id="menu" class="menu"></div>

<div id="learn" style="display:none">

<h2 id="topicTitle"></h2>

<div class="card" id="word"></div>

<div class="meaning" id="meaning"></div>

<div class="nav">

<button onclick="prevWord()">⬅️</button>

<button onclick="showMenu()">🏠</button>

<button onclick="nextWord()">➡️</button>

<button onclick="startTest()">📝 Test</button>

</div>

</div>


<div id="test" style="display:none">

<h2>Test</h2>

<div class="card" id="question"></div>

<div id="options"></div>

<div class="result" id="result"></div>

<div class="nav">

<button onclick="nextQuestion()">➡️</button>

<button onclick="showMenu()">🏠</button>

</div>

</div>

</div>

<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

const topics=[

{title:"Selamlaşma",words:[
["Hello","Merhaba"],
["Good morning","Günaydın"],
["Good night","İyi geceler"],
["Goodbye","Güle güle"],
["Please","Lütfen"],
["Thank you","Teşekkür ederim"],
["Sorry","Üzgünüm"],
["Yes","Evet"],
["No","Hayır"],
["Excuse me","Afedersiniz"]
]},

{title:"Ev",words:[
["House","Ev"],
["Door","Kapı"],
["Table","Masa"],
["Chair","Sandalye"],
["Bed","Yatak"],
["Kitchen","Mutfak"],
["Window","Pencere"],
["Room","Oda"],
["Floor","Zemin"],
["Wall","Duvar"]
]},

{title:"Okul",words:[
["School","Okul"],
["Teacher","Öğretmen"],
["Student","Öğrenci"],
["Book","Kitap"],
["Pen","Kalem"],
["Notebook","Defter"],
["Bag","Çanta"],
["Board","Tahta"],
["Lesson","Ders"],
["Class","Sınıf"]
]},

{title:"Yemek",words:[
["Bread","Ekmek"],
["Milk","Süt"],
["Water","Su"],
["Egg","Yumurta"],
["Cheese","Peynir"],
["Apple","Elma"],
["Orange","Portakal"],
["Rice","Pirinç"],
["Fish","Balık"],
["Meat","Et"]
]},

{title:"Sayılar",words:[
["One","Bir"],
["Two","İki"],
["Three","Üç"],
["Four","Dört"],
["Five","Beş"],
["Six","Altı"],
["Seven","Yedi"],
["Eight","Sekiz"],
["Nine","Dokuz"],
["Ten","On"]
]},

{title:"Renkler",words:[
["Red","Kırmızı"],
["Blue","Mavi"],
["Green","Yeşil"],
["Yellow","Sarı"],
["Black","Siyah"],
["White","Beyaz"],
["Orange","Turuncu"],
["Purple","Mor"],
["Pink","Pembe"],
["Brown","Kahverengi"]
]},

{title:"Hayvanlar",words:[
["Cat","Kedi"],
["Dog","Köpek"],
["Bird","Kuş"],
["Cow","İnek"],
["Horse","At"],
["Sheep","Koyun"],
["Fish","Balık"],
["Duck","Ördek"],
["Lion","Aslan"],
["Tiger","Kaplan"]
]},

{title:"Hava",words:[
["Sunny","Güneşli"],
["Rainy","Yağmurlu"],
["Cloudy","Bulutlu"],
["Windy","Rüzgarlı"],
["Snowy","Karlı"],
["Hot","Sıcak"],
["Cold","Soğuk"],
["Storm","Fırtına"],
["Fog","Sis"],
["Dry","Kuru"]
]},

{title:"Yönler",words:[
["Left","Sol"],
["Right","Sağ"],
["Up","Yukarı"],
["Down","Aşağı"],
["North","Kuzey"],
["South","Güney"],
["East","Doğu"],
["West","Batı"],
["Near","Yakın"],
["Far","Uzak"]
]},

{title:"Günlük",words:[
["Today","Bugün"],
["Tomorrow","Yarın"],
["Yesterday","Dün"],
["Morning","Sabah"],
["Evening","Akşam"],
["Night","Gece"],
["Friend","Arkadaş"],
["Family","Aile"],
["Work","İş"],
["Home","Ev"]
]}

]

let currentTopic=0
let currentWord=0

const menu=document.getElementById("menu")

topics.forEach((t,i)=>{
let b=document.createElement("button")
b.innerText=t.title
b.onclick=()=>openTopic(i)
menu.appendChild(b)
})

function openTopic(i){

currentTopic=i
currentWord=0

document.getElementById("menu").style.display="none"
document.getElementById("learn").style.display="block"

showWord()

}

function showWord(){

let w=topics[currentTopic].words[currentWord]

document.getElementById("topicTitle").innerText=topics[currentTopic].title
document.getElementById("word").innerText=w[0]
document.getElementById("meaning").innerText=w[1]

}

function nextWord(){

currentWord++

if(currentWord>=topics[currentTopic].words.length)
currentWord=0

showWord()

}

function prevWord(){

currentWord--

if(currentWord<0)
currentWord=topics[currentTopic].words.length-1

showWord()

}

function showMenu(){

document.getElementById("learn").style.display="none"
document.getElementById("test").style.display="none"
document.getElementById("menu").style.display="block"

}

let testList=[]
let q=0

function startTest(){

document.getElementById("learn").style.display="none"
document.getElementById("test").style.display="block"

testList=[]

topics.forEach(t=>{
t.words.forEach(w=>{
testList.push(w)
})
})

q=0

showQuestion()

}

function showQuestion(){

let w=testList[q]

document.getElementById("question").innerText=w[0]

let options=[w[1]]

while(options.length<4){

let r=testList[Math.floor(Math.random()*testList.length)][1]

if(!options.includes(r))
options.push(r)

}

options.sort(()=>Math.random()-0.5)

let box=document.getElementById("options")
box.innerHTML=""

options.forEach(o=>{

let b=document.createElement("button")

b.className="testOption"
b.innerText=o

b.onclick=()=>check(o,w[1])

box.appendChild(b)

})

document.getElementById("result").innerText=""

}

function check(a,c){

if(a==c){

document.getElementById("result").innerText="✅ Doğru"

document.getElementById("correctSound").play()

}else{

document.getElementById("result").innerText="❌ Yanlış: "+c

document.getElementById("wrongSound").play()

}

}

function nextQuestion(){

q++

if(q>=testList.length)
q=0

showQuestion()

}

</script>

</body>
</html>
