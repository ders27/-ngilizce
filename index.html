<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Öğrenme ve Test Uygulaması</title>
<style>
body {font-family: Arial, sans-serif; background: #FFF8E1; margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh;}
#app {width:95%; max-width:700px; background:#FFF; border-radius:20px; padding:20px; box-shadow:0 10px 20px rgba(0,0,0,0.2);}
h2 {text-align:center; color:#FF5722; margin-bottom:20px;}
.word-card {font-size:2em; font-weight:bold; padding:20px; border:3px solid #FFAB00; border-radius:15px; text-align:center; cursor:pointer; background:#FFFDE7; display:flex; justify-content:center; align-items:center; gap:10px;}
.word-meaning {font-size:1.6em; color:#1976D2;}
.nav-buttons {margin-top:30px; display:flex; justify-content:center; gap:20px;}
.nav-buttons button {padding:12px 20px; font-size:1.2em; border:none; border-radius:10px; cursor:pointer; background:#FF5722; color:#fff;}
.nav-buttons button:hover {background:#E64A19;}
#menu {display:flex; flex-wrap:wrap; justify-content:center; gap:15px;}
#menu button {padding:15px 25px; font-size:1em; border-radius:12px; background:#2196F3; color:#fff; border:none; cursor:pointer;}
#menu button:hover {background:#42A5F5;}
.test-screen {display:none;}
.test-word {font-size:2em; text-align:center; margin:20px 0;}
.test-options {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.test-options button {padding:12px; font-size:1em; border-radius:8px; border:1px solid #ccc; cursor:pointer; background:#f3f3f3;}
.test-options button:hover {background:#e0e0e0;}
.feedback {margin-top:15px; font-weight:bold; text-align:center;}
#score {text-align:center; font-size:1.5em; margin-top:15px;}
</style>
</head>
<body>
<div id="app">
<div id="title-screen">
<h2>İngilizce Öğrenme ve Test</h2>
<button onclick="showMenu()">Başla 🏠</button>
</div>

<div id="menu" style="display:none;"></div>

<div id="learn-screen" style="display:none;">
<h2 id="block-title"></h2>
<div class="word-card" id="word-card">
<img id="word-icon" src="" alt="" width="40" height="40">
<span id="word-text">Word</span>
</div>
<div class="word-meaning" id="word-meaning"></div>
<div class="nav-buttons">
<button onclick="previousWord()">⬅️</button>
<button onclick="goMenu()">🏠</button>
<button onclick="nextWord()">➡️</button>
<button onclick="startTest()">📝 Test</button>
</div>
</div>

<div id="test-screen" class="test-screen">
<h2>📝 Test</h2>
<div class="test-word" id="test-word"></div>
<div class="test-options" id="test-options"></div>
<div class="feedback" id="feedback"></div>
<div id="score"></div>
<div class="nav-buttons">
<button onclick="prevTest()">⬅️ Önceki</button>
<button onclick="nextTest()">➡️ Sonraki</button>
<button onclick="goMenu()">🏠 Menü</button>
</div>
</div>
</div>

<script>
// Kelime blokları
const blocks = [
{title:"Selamlaşma", words:[
{en:"Good morning", tr:"Günaydın", icon:"https://img.icons8.com/color/48/000000/sun--v1.png"},
{en:"Hello", tr:"Merhaba", icon:"https://img.icons8.com/color/48/000000/hello.png"},
{en:"Goodbye", tr:"Güle güle", icon:"https://img.icons8.com/color/48/000000/waving-hand.png"},
{en:"See you", tr:"Görüşürüz", icon:"https://img.icons8.com/color/48/000000/waving-hand.png"},
{en:"Good night", tr:"İyi geceler", icon:"https://img.icons8.com/color/48/000000/moon-symbol.png"},
{en:"How are you?", tr:"Nasılsın?", icon:"https://img.icons8.com/color/48/000000/question-mark.png"},
{en:"I'm fine", tr:"İyiyim", icon:"https://img.icons8.com/color/48/000000/smiling.png"},
{en:"Nice to meet you", tr:"Tanıştığımıza memnun oldum", icon:"https://img.icons8.com/color/48/000000/handshake.png"},
{en:"Bye", tr:"Hoşça kal", icon:"https://img.icons8.com/color/48/000000/waving-hand.png"},
{en:"Have a nice day", tr:"İyi günler", icon:"https://img.icons8.com/color/48/000000/sun--v1.png"}
]},
{title:"Ev ve Okul", words:[
{en:"House", tr:"Ev", icon:"https://img.icons8.com/color/48/000000/home.png"},
{en:"Door", tr:"Kapı", icon:"https://img.icons8.com/color/48/000000/door.png"},
{en:"Chair", tr:"Sandalye", icon:"https://img.icons8.com/color/48/000000/chair.png"},
{en:"Table", tr:"Masa", icon:"https://img.icons8.com/color/48/000000/table.png"},
{en:"Book", tr:"Kitap", icon:"https://img.icons8.com/color/48/000000/book.png"},
{en:"Pen", tr:"Kalem", icon:"https://img.icons8.com/color/48/000000/pen.png"},
{en:"Notebook", tr:"Defter", icon:"https://img.icons8.com/color/48/000000/notebook.png"},
{en:"Window", tr:"Pencere", icon:"https://img.icons8.com/color/48/000000/window.png"},
{en:"School", tr:"Okul", icon:"https://img.icons8.com/color/48/000000/school.png"},
{en:"Teacher", tr:"Öğretmen", icon:"https://img.icons8.com/color/48/000000/teacher.png"}
]}];

// Menü
function showMenu(){
  document.getElementById("title-screen").style.display="none";
  const menu = document.getElementById("menu");
  menu.innerHTML="";
  blocks.forEach((b,i)=>{
    const btn=document.createElement("button");
    btn.textContent=b.title;
    btn.onclick=()=>{openBlock(i)};
    menu.appendChild(btn);
  });
  menu.style.display="flex";
}

let currentBlockIndex=0;
let currentWordIndex=0;

// Kelime ekranı
function openBlock(idx){
  currentBlockIndex=idx;
  currentWordIndex=0;
  document.getElementById("menu").style.display="none";
  document.getElementById("learn-screen").style.display="block";
  showWord();
}

function showWord(){
  const w=blocks[currentBlockIndex].words[currentWordIndex];
  document.getElementById("block-title").textContent=blocks[currentBlockIndex].title;
  document.getElementById("word-text").textContent=w.en;
  document.getElementById("word-meaning").textContent=w.tr;
  document.getElementById("word-icon").src=w.icon;
}

function nextWord(){currentWordIndex++; if(currentWordIndex>=blocks[currentBlockIndex].words.length) currentWordIndex=0; showWord();}
function previousWord(){currentWordIndex--; if(currentWordIndex<0) currentWordIndex=blocks[currentBlockIndex].words.length-1; showWord();}
function goMenu(){document.getElementById("learn-screen").style.display="none"; document.getElementById("menu").style.display="flex";}

// Test bölümü
let testQuestions=[];
let currentTestIndex=0;
function startTest(){
  document.getElementById("learn-screen").style.display="none";
  document.getElementById("test-screen").style.display="block";
  generateTest();
  showTest();
}
function generateTest(){
  testQuestions=[];
  blocks.forEach(b=>{
    b.words.forEach(w=>{
      const options=[w.tr];
      while(options.length<4){
        const randB=blocks[Math.floor(Math.random()*blocks.length)];
        const randW=randB.words[Math.floor(Math.random()*randB.words.length)];
        if(!options.includes(randW.tr)) options.push(randW.tr);
      }
      options.sort(()=>Math.random()-0.5);
      testQuestions.push({en:w.en,tr:w.tr,options:options});
    });
  });
  testQuestions.sort(()=>Math.random()-0.5);
  currentTestIndex=0;
}
function showTest(){
  const q=testQuestions[currentTestIndex];
  document.getElementById("test-word").textContent=q.en;
  const opts=document.getElementById("test-options");
  opts.innerHTML="";
  q.options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.textContent=opt;
    btn.onclick=()=>{checkAnswer(opt)};
    opts.appendChild(btn);
  });
  document.getElementById("feedback").textContent="";
  document.getElementById("score").textContent=`Soru: ${currentTestIndex+1}/${testQuestions.length}`;
}
function checkAnswer(selected){
  const correct=testQuestions[currentTestIndex].tr;
  const feedback=document.getElementById("feedback");
  if(selected===correct){feedback.textContent="✅ Doğru!";}
  else{feedback.textContent=`❌ Yanlış! Doğru: ${correct}`;}
}
function nextTest(){currentTestIndex++; if(currentTestIndex>=testQuestions.length) currentTestIndex=0; showTest();}
function prevTest(){currentTestIndex--; if(currentTestIndex<0) currentTestIndex=testQuestions.length-1; showTest();}
</script>
</body>
</html>
