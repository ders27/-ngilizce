<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Öğrenme Uygulaması</title>
<style>
body {font-family: Arial, sans-serif; background: #FFF8E1; margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh;}
#app {width:95%; max-width:700px; background:#FFF; border-radius:20px; padding:20px; box-shadow:0 10px 20px rgba(0,0,0,0.2);}
h2 {text-align:center; color:#FF5722; margin-bottom:20px;}
.word-card {font-size:2em; font-weight:bold; padding:20px; border:3px solid #FFAB00; border-radius:15px; text-align:center; cursor:pointer; background:#FFFDE7; display:inline-block;}
.word-meaning {font-size:1.6em; color:#1976D2; margin-left:20px; display:inline-block;}
.nav-buttons {margin-top:30px; display:flex; justify-content:center; gap:20px;}
.nav-buttons button {padding:12px 20px; font-size:1.2em; border:none; border-radius:10px; cursor:pointer; background:#FF5722; color:#fff;}
.nav-buttons button:hover {background:#E64A19;}
#menu {display:flex; flex-wrap:wrap; justify-content:center; gap:15px;}
#menu button {padding:15px 25px; font-size:1em; border-radius:12px; background:#2196F3; color:#fff; border:none; cursor:pointer;}
#menu button:hover {background:#42A5F5;}
#test-screen {display:none;}
.test-word {font-size:2em; text-align:center; margin:20px 0;}
.test-options {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.test-options button {padding:12px; font-size:1em; border-radius:8px; border:1px solid #ccc; cursor:pointer; background:#f3f3f3;}
.test-options button:hover {background:#e0e0e0;}
.feedback {margin-top:15px; font-weight:bold; text-align:center;}
</style>
</head>
<body>
<div id="app">
<div id="title-screen">
<h2>İngilizce Öğrenme Uygulaması</h2>
<button onclick="showMenu()">Başla 🏠</button>
</div>

<div id="menu" style="display:none;">
<!-- 10 başlık -->
</div>

<div id="learn-screen" style="display:none;">
<h2 id="block-title"></h2>
<div style="display:flex; justify-content:center; align-items:center; margin:15px 0;">
<div class="word-card" id="word-card">Word</div>
<div class="word-meaning" id="word-meaning"></div>
</div>
<div class="nav-buttons">
<button onclick="previousWord()">⬅️</button>
<button onclick="goMenu()">🏠</button>
<button onclick="nextWord()">➡️</button>
</div>
</div>

<div id="test-screen">
<h2>📝 Test</h2>
<div class="test-word" id="test-word"></div>
<div class="test-options" id="test-options"></div>
<div class="feedback" id="feedback"></div>
<div class="nav-buttons">
<button onclick="prevTest()">⬅️ Önceki</button>
<button onclick="nextTest()">➡️ Sonraki</button>
</div>
</div>
</div>

<script>
const blocks = [

]},

{en:"Rice", tr:"Pirinç"},
{en:"Soup", tr:"Çorba"},
{en:"Meat", tr:"Et"},
{en:"Juice", tr:"Meyve suyu"}
]},
{title:"Sayılar", words:[
{en:"One", tr:"Bir"},
{en:"Two", tr:"İki"},
{en:"Three", tr:"Üç"},
{en:"Four", tr:"Dört"},
{en:"Five", tr:"Beş"},
{en:"Six", tr:"Altı"},
{en:"Seven", tr:"Yedi"},
{en:"Eight", tr:"Sekiz"},
{en:"Nine", tr:"Dokuz"},
{en:"Ten", tr:"On"}
]},
{title:"Hava Durumu ve Mevsimler", words:[
{en:"Sunny", tr:"Güneşli"},

{en:"Snowy", tr:"Karlı"},

{title:"Hayvanlar", words:[

{en:"Cow", tr:"İnek"},
{en:"Horse", tr:"At"},
{en:"Sheep", tr:"Koyun"},
{en:"Chicken", tr:"Tavuk"},
{en:"Rabbit", tr:"Tavşan"},
{en:"Duck", tr:"Ördek"}
]},
{title:"Renkler", words:[
{en:"Red", tr:"Kırmızı"},
{en:"Blue", tr:"Mavi"},

]},
{title:"Duygular", words:[

{en:"Excited", tr:"Heyecanlı"},

{en:"Scared", tr:"Korkmuş"},
{en:"Calm", tr:"Sakin"},
{en:"Confused", tr:"Kafası karışık"}
]},
{title:"Günlük İfadeler", words:[
{en:"Please", tr:"Lütfen"},

{en:"Sorry", tr:"Üzgünüm"},
{en:"Excuse me", tr:"Affedersiniz"},
{en:"Yes", tr:"Evet"},
{en:"No", tr:"Hayır"},
{en:"Help me", tr:"Yardım edin"},
{en:"I understand", tr:"Anladım"},
{en:"I don't understand", tr:"Anlamadım"},
{en:"Good luck", tr:"İyi şanslar"}
]}];

let currentBlockIndex = 0;
let currentWordIndex = 0;

function showMenu(){
    document.getElementById("title-screen").style.display="none";
    const menu = document.getElementById("menu");
    menu.innerHTML="";
    blocks.forEach((b,i)=>{
        const btn = document.createElement("button");
        btn.textContent=b.title;
        btn.onclick=()=>{openBlock(i)};
        menu.appendChild(btn);
    });
    menu.style.display="flex";
}

function openBlock(idx){
    currentBlockIndex=idx;
    currentWordIndex=0;
    document.getElementById("menu").style.display="none";
    document.getElementById("learn-screen").style.display="block";
    showWord();
}

function showWord(){
    const w = blocks[currentBlockIndex].words[currentWordIndex];
    document.getElementById("block-title").textContent=blocks[currentBlockIndex].title;
    document.getElementById("word-card").textContent=w.en;
    document.getElementById("word-meaning").textContent=w.tr;
}

function nextWord(){
    currentWordIndex++;
    if(currentWordIndex>=blocks[currentBlockIndex].words.length) currentWordIndex=0;
    showWord();
}

function previousWord(){
    currentWordIndex--;
    if(currentWordIndex<0) currentWordIndex=blocks[currentBlockIndex].words.length-1;
    showWord();
}

function goMenu(){
    document.getElementById("learn-screen").style.display="none";
    document.getElementById("menu").style.display="flex";
}
</script>
</body>
</html>
