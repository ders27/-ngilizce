<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Çocuk İngilizce</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f2f6ff;
text-align:center;
margin:0;
overflow-x:hidden;
}

.container{
max-width:500px;
margin:auto;
padding:10px;
}

h1{
background:#4CAF50;
color:white;
padding:15px;
margin:0;
}

button{
width:90%;
padding:15px;
margin:8px;
font-size:20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
}

.wordbox{

margin-top:120px;
font-size:45px;
background:white;
padding:40px;
border-radius:15px;

}

.translate{

font-size:30px;
margin-top:20px;
color:#333;

}

.arrow{

width:40%;
font-size:25px;

}

.controls{

margin-top:60px;

}

.option{

display:block;
margin:10px auto;
width:90%;
font-size:22px;
padding:12px;
background:white;
border:2px solid #4CAF50;

}

</style>

</head>

<body>

<h1>📚 İngilizce Öğren</h1>

<div class="container">

<div id="menu">

<button onclick="openUnits()">📚 Kelimeler</button>
<button onclick="openTest()">🧠 Test</button>

</div>


<div id="units" style="display:none">

<button onclick="startUnit('greetings')">Selamlaşma</button>
<button onclick="startUnit('numbers')">Sayılar</button>
<button onclick="startUnit('home')">Ev</button>
<button onclick="startUnit('kitchen')">Mutfak</button>
<button onclick="startUnit('school')">Okul</button>
<button onclick="startUnit('verbs')">Fiiller</button>
<button onclick="startUnit('family')">Aile</button>
<button onclick="startUnit('food')">Yiyecek</button>
<button onclick="startUnit('animals')">Hayvanlar</button>
<button onclick="startUnit('daily')">Günlük</button>

<button onclick="backMenu()">🏠 Menü</button>

</div>


<div id="wordPage" style="display:none">

<div class="wordbox" onclick="showTranslation()">

<div id="english"></div>
<div id="turkish" class="translate"></div>

</div>

<div class="controls">

<button class="arrow" onclick="prevWord()">⬅️</button>
<button class="arrow" onclick="nextWord()">➡️</button>

</div>

<button onclick="openUnits()">⬅️ Üniteler</button>

</div>


<div id="testPage" style="display:none">

<h2 id="question"></h2>

<div id="options"></div>

<button onclick="backMenu()">🏠 Menü</button>

</div>

</div>


<script>

let units={

greetings:[
["hello","merhaba"],
["good morning","günaydın"],
["good night","iyi geceler"],
["goodbye","güle güle"],
["thank you","teşekkürler"],
["please","lütfen"],
["sorry","özür dilerim"],
["yes","evet"],
["no","hayır"],
["welcome","hoşgeldin"]
],

numbers:[
["one","bir"],
["two","iki"],
["three","üç"],
["four","dört"],
["five","beş"],
["six","altı"],
["seven","yedi"],
["eight","sekiz"],
["nine","dokuz"],
["ten","on"]
],

home:[
["house","ev"],
["room","oda"],
["door","kapı"],
["window","pencere"],
["bed","yatak"],
["table","masa"],
["chair","sandalye"],
["kitchen","mutfak"],
["bathroom","banyo"],
["garden","bahçe"]
],

kitchen:[
["food","yemek"],
["water","su"],
["milk","süt"],
["bread","ekmek"],
["cheese","peynir"],
["egg","yumurta"],
["salt","tuz"],
["sugar","şeker"],
["tea","çay"],
["coffee","kahve"]
],

school:[
["school","okul"],
["teacher","öğretmen"],
["student","öğrenci"],
["book","kitap"],
["pen","kalem"],
["pencil","kurşun kalem"],
["bag","çanta"],
["board","tahta"],
["lesson","ders"],
["exam","sınav"]
],

verbs:[
["eat","yemek"],
["drink","içmek"],
["sleep","uyumak"],
["run","koşmak"],
["walk","yürümek"],
["play","oynamak"],
["read","okumak"],
["write","yazmak"],
["listen","dinlemek"],
["watch","izlemek"]
],

family:[
["mother","anne"],
["father","baba"],
["sister","kız kardeş"],
["brother","erkek kardeş"],
["baby","bebek"],
["family","aile"],
["aunt","teyze"],
["uncle","amca"],
["son","oğul"],
["daughter","kız"]
],

food:[
["apple","elma"],
["banana","muz"],
["orange","portakal"],
["grape","üzüm"],
["tomato","domates"],
["potato","patates"],
["carrot","havuç"],
["rice","pirinç"],
["cake","pasta"],
["chocolate","çikolata"]
],

animals:[
["cat","kedi"],
["dog","köpek"],
["bird","kuş"],
["fish","balık"],
["cow","inek"],
["lion","aslan"],
["tiger","kaplan"],
["elephant","fil"],
["rabbit","tavşan"],
["bear","ayı"]
],

daily:[
["what","ne"],
["where","nerede"],
["when","ne zaman"],
["why","neden"],
["how","nasıl"],
["who","kim"],
["come","gel"],
["go","git"],
["stop","dur"],
["help","yardım"]
]

}

let current=[]
let index=0

function openUnits(){

hideAll()
document.getElementById("units").style.display="block"

}

function startUnit(name){

current=units[name]
index=0

hideAll()
document.getElementById("wordPage").style.display="block"

loadWord()

}

function loadWord(){

document.getElementById("english").innerText=current[index][0]
document.getElementById("turkish").innerText=""

}

function showTranslation(){

document.getElementById("turkish").innerText=current[index][1]

}

function nextWord(){

index++

if(index>=current.length) index=0

loadWord()

}

function prevWord(){

index--

if(index<0) index=current.length-1

loadWord()

}

function openTest(){

hideAll()
document.getElementById("testPage").style.display="block"

newQuestion()

}

function newQuestion(){

let all=Object.values(units).flat()

let q=all[Math.floor(Math.random()*all.length)]

document.getElementById("question").innerText=q[0]+" ne demek?"

let options=[q]

while(options.length<4){

let r=all[Math.floor(Math.random()*all.length)]

if(!options.includes(r)) options.push(r)

}

options.sort(()=>Math.random()-0.5)

let html=""

options.forEach(o=>{

html+=`<button class="option" onclick="answer('${o[1]}','${q[1]}')">${o[1]}</button>`

})

document.getElementById("options").innerHTML=html

}

function answer(a,b){

if(a==b){

playCorrect()

}else{

playWrong()

}

setTimeout(newQuestion,800)

}

function playCorrect(){

new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play()

}

function playWrong(){

new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play()

}

function backMenu(){

location.reload()

}

function hideAll(){

document.getElementById("menu").style.display="none"
document.getElementById("units").style.display="none"
document.getElementById("wordPage").style.display="none"
document.getElementById("testPage").style.display="none"

}

</script>

</body>
</html>
